; OpenGemTester - PlatformIO Configuration
; Open-source ESP32-S3 gemstone and diamond tester
; https://github.com/OpenGemTester

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; Partition scheme with enough space for BLE + OTA
board_build.partitions = default.csv

; Enable USB CDC for serial output on ESP32-S3
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    adafruit/Adafruit ADS1X15@^2.5.0
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
    adafruit/Adafruit NeoPixel@^1.12.0
